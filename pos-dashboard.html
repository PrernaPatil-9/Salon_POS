<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon POS | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Add this in the head section for QR code generation -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
    <div class="pos-container">
        <!-- Header -->
        <header class="pos-header">
            <div class="logo">
                <i class="fas fa-cut"></i>
                <h1>Smart Look Salon</h1>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search services...">
                </div>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="user-mobile"></span>
                    <button id="logout-btn" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main POS Area -->
        <div class="pos-main">
            <!-- LEFT SECTION: Services Grid -->
            <div class="services-section">
                <div class="category-tabs" id="category-tabs">
                    <!-- Categories will be dynamically loaded -->
                </div>
                
                <div class="services-grid" id="services-grid">
                    <!-- Services will be dynamically loaded -->
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i> Loading services...
                    </div>
                </div>
            </div>

            <!-- Updated Cart Section - Replace the existing cart-section div with this -->
            <div class="cart-section">
                <div class="cart-header">
                    <h2><i class="fas fa-shopping-cart"></i> Current Bill</h2>
                    <button id="clear-cart" class="clear-cart-btn">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            
                <div class="cart-items" id="cart-items">
                    <div class="empty-cart">
                        <i class="fas fa-box-open"></i>
                        <p>No services added yet</p>
                    </div>
                </div>
            
                <!-- Customer Details Section (New) -->
                <!-- Customer Details Section (Updated with IDs) -->
<div class="customer-details-section">
    <h3><i class="fas fa-user"></i> Customer Details</h3>
    <div class="flex gap-3">
        <div class="customer-input-group w-1/2">
            <input type="text" id="cart-customer-name" placeholder="Customer Name" class="customer-input">
        </div>
        <div class="customer-input-group w-1/2">
            <input type="tel" id="cart-customer-phone" placeholder="Mobile Number" class="customer-input">
        </div>
    </div>
    <div class="customer-input-group">
        <select id="cart-staff-name" class="customer-input">
            <option value="">Select Staff</option>
            <option value="Amit ">Amit </option>
            <option value="Priya ">Priya </option>
            <option value="Raj ">Raj </option>
            <option value="Neha ">Neha </option>
        </select>
    </div>
</div>
            
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <!-- Discount section commented out as requested -->
                    <!-- 
                    <div class="summary-row">
                        <span>Discount:</span>
                        <span id="discount-amount">-₹0</span>
                    </div>
                    -->
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total-amount">₹0</span>
                    </div>
            
                    <!-- Payment Method Section (New) -->
                    <div class="payment-method-section">
                        <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
                        <div class="payment-options">
                            <label class="payment-option">
                                <input type="radio" name="payment-method" value="Cash" checked>
                                <span class="payment-label">
                                    <i class="fas fa-money-bill-wave"></i> Cash
                                </span>
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment-method" value="GPay">
                                <span class="payment-label">
                                    <i class="fab fa-google-pay"></i> GPay
                                </span>
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment-method" value="UPI">
                                <span class="payment-label">
                                    <i class="fas fa-qrcode"></i> UPI
                                </span>
                            </label>
                        </div>
                    </div>
            
                    
            
                    <button class="checkout-btn" id="checkout-btn">
                        <i class="fas fa-arrow-right"></i> Process Payment
                    </button>
                </div>
            </div>
        </div>

        <!-- Bill Modal -->
        <div id="bill-modal" class="modal">
            <div class="modal-content bill-content">
                <div class="modal-header">
                    <h2>Bill Receipt</h2>
                    <button class="print-btn" onclick="window.print()">
                        <i class="fas fa-print"></i> Print
                    </button>
                </div>
                
                <div id="bill-details" class="bill-details"></div>
                
                <div class="modal-footer">
                    <button class="close-btn" onclick="closeBillModal()">
                        <i class="fas fa-check"></i> Done
                    </button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
